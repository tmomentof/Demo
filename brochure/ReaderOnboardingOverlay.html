                <div style={{ position: "absolute", inset: 0, borderRadius: "inherit", background: "radial-gradient(ellipse at 50% 30%, rgba(196,160,85,0.12) 0%, rgba(196,160,85,0) 65%)", pointerEvents: "none" }}/>
                <div style={{ flex: 1, width: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-start", paddingTop: 8, minHeight: 0 }}>
                    <p className="font-sans" style={{ margin: 0, fontSize: 10, letterSpacing: "0.14em", textTransform: "uppercase", fontWeight: 700, color: "#D4B87A", textAlign: "center" }}>Closeness Signature</p>
                    <div style={{ width: 168, height: 168, display: "flex", alignItems: "center", justifyContent: "center", transform: "translateX(-2px)" }}>
                    <SignatureGlyph dark={true}/>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 5, marginTop: 10, maxWidth: 170 }}>
                    <p className="font-reading" style={{ margin: 0, fontSize: 13, lineHeight: 1.62, color: "rgba(248,242,228,0.82)", textAlign: "center" }}>Shows how you both think and feel through the same words.</p>
                    <div style={{ position: "relative", flexShrink: 0 }}>
                        <button onMouseEnter={() => setSignatureHovered(true)} onMouseLeave={() => setSignatureHovered(false)}
                        style={{ width: 16, height: 16, borderRadius: "50%", border: "1px solid rgba(212,184,122,0.5)", background: "rgba(212,184,122,0.12)", color: "#D4B87A", fontSize: 10, fontWeight: 700, lineHeight: 1, cursor: "help", display: "flex", alignItems: "center", justifyContent: "center", padding: 0 }}>i</button>
                        {signatureHovered && (
                        <div style={{ position: "absolute", right: 0, top: "calc(100% + 8px)", width: 260, padding: "14px 16px", borderRadius: 16, background: "rgba(255,252,245,0.98)", border: "1px solid rgba(139,105,20,0.14)", boxShadow: "0 16px 28px rgba(44,26,8,0.08)", zIndex: 20 }}>
                            {[["t","Think","#8B6914"],["f","Feel","#8B6914"]].map(([l,n,c]) => (
                            <p key={l} className="font-reading" style={{ margin: "0 0 7px", fontSize: 12, lineHeight: 1.55, color: "rgba(44,26,8,0.80)" }}>
                                The <strong style={{ color: c, fontStyle: "normal" }}>{l}</strong> glyph shows your {n} dimension.
                            </p>
                            ))}
                            {[["RES","Resonance","#2D8A4E","Your readings are in Harmony."],["CON","Contradiction","#C0392B","Your readings push directly against each other."],["DIV","Divergence","#6B6B63","You each went somewhere entirely different."]].map(([k,n,c,d]) => (
                            <p key={k} className="font-reading" style={{ margin: "0 0 4px", fontSize: 12, lineHeight: 1.55, color: "rgba(44,26,8,0.80)" }}>
                                <strong style={{ color: c, fontStyle: "normal" }}>{k}</strong> - {n}. {d}
                            </p>
                            ))}
                            <p className="font-reading" style={{ margin: 0, fontSize: 12, lineHeight: 1.55, color: "rgba(44,26,8,0.80)" }}>The dominant color colors the glyph respectively.</p>
                        </div>
                        )}
                    </div>
                    </div>
                </div>
                <div style={{ width: "100%", display: "flex", flexDirection: "column", gap: 8 }}>
                    <ScoreBar label="t" labelColor="#D4B87A" values={{ res: SOFIA.rt, con: SOFIA.ct, div: SOFIA.dt }}/>
                    <ScoreBar label={<span style={{display:"inline-block", transform:"rotate(180deg)", transformOrigin:"center"}}>t</span>} labelColor="#D4B87A" values={{ res: SOFIA.rf, con: SOFIA.cf, div: SOFIA.df }}/>
                </div>
                </div>

                {/* Sofia profile card */}
                <div style={{ ...softCard, padding: 20, display: "flex", flexDirection: "column", justifyContent: "space-between", minHeight: 0, zIndex: 1 }}>
                <div>
                    <p className="font-sans" style={{ margin: "0 0 10px", fontSize: 10, letterSpacing: "0.14em", textTransform: "uppercase", fontWeight: 700, color: "rgba(139,105,20,0.72)" }}>Reader who captured the same moment</p>
                    <div style={{ position: "relative", borderRadius: 18, border: "1px solid rgba(196,160,85,0.28)", overflow: "hidden", background: "#F7F0DF" }}>
                    <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 16, background: "#6B4E0A" }}>
                        <svg viewBox="0 0 360 16" preserveAspectRatio="none" style={{ display: "block", width: "100%", height: "100%" }}>
                        {[6,27,48,69,90,111,132,153,174,195,216,237,258,279,300,321,342].map(x => (
                            <g key={x}><rect x={x} y="1" width="2" height="14" rx="1" fill="#D4B87A"/><rect x={x+8} y="1" width="2" height="14" rx="1" fill="#D4B87A"/></g>
                        ))}
                        </svg>
                    </div>
                    <div style={{ position: "relative", height: 196, overflow: "hidden", background: "#CDB98A", marginTop: 16 }}>
                            <img src={SOFIA.photo} alt={SOFIA.name} style={{ width: "100%", height: "100%", objectFit: "cover", display: "block", filter: "saturate(0.92) contrast(1.02)" }}/>
                        <div style={{ position: "absolute", inset: 0, background: "linear-gradient(180deg, rgba(28,22,12,0.08) 0%, rgba(28,22,12,0.02) 30%, rgba(28,22,12,0.72) 75%, rgba(28,22,12,0.86) 100%)" }}/>
                        <div style={{ position: "absolute", left: 7, top: 7, zIndex: 4, pointerEvents: "none" }}>
                        <svg width="66" height="67" viewBox="-6 9 66 67" style={{ display: "block" }}>
                            <rect x="-3" y="12" width="46" height="55" rx="10" fill="rgba(12,8,2,0.58)" stroke="rgba(255,255,255,0.12)" strokeWidth="1"/>
                            <text x="4" y="50" fontFamily="'Playfair Display',serif" fontWeight="700" fontSize="42" fill="#2D8A4E">t</text>
                            <text x="36" y="50" fontFamily="'Playfair Display',serif" fontWeight="700" fontSize="42" fill="#C0392B" transform="translate(72,80) rotate(180)">t</text>
                            <text x="13" y="62" fontFamily="'DM Sans',sans-serif" fontWeight="700" fontSize="9" fill="#2D8A4E" textAnchor="middle" letterSpacing="0.5">RES</text>
                            <text x="30" y="26" fontFamily="'DM Sans',sans-serif" fontWeight="700" fontSize="9" fill="#C0392B" textAnchor="middle" letterSpacing="0.5">CON</text>
                        </svg>
                        </div>
                        <p className="font-serif" style={{ position: "absolute", left: 16, bottom: 8, margin: 0, fontSize: 16, fontWeight: 700, color: "#F8F2E4" }}>{SOFIA.name}</p>
                    </div>
                    <div style={{ padding: "12px 16px 14px", background: "linear-gradient(180deg, rgba(191,157,75,0.88) 0%, rgba(174,138,54,0.92) 100%)" }}>
                        <div style={{ display: "flex", justifyContent: "center" }}>
                        <button
                            onClick={() => { setCloseReaderMade(true); setSelectedCloseReader(demoCloseReaders[1]); }}
                            style={{ padding: "7px 18px", borderRadius: 999, border: "1.2px solid rgba(238,224,196,0.72)", background: closeReaderMade ? "rgba(139,105,20,0.18)" : "#F4E8CB", fontFamily: "'Playfair Display',serif", fontSize: 13, fontStyle: "italic", fontWeight: 700, color: "#8B6914", cursor: closeReaderMade ? "default" : "pointer", transition: "background 200ms ease" }}>
                            {closeReaderMade ? "~ Waved" : "~ Wave"}
                        </button>
                        </div>
                    </div>
                    </div>
                    <p className="font-reading" style={{ margin: "12px 2px 0", fontSize: 13, lineHeight: 1.62, color: "rgba(44,26,8,0.64)", textAlign: "center" }}>Wave to become Close Readers.</p>
                </div>
                </div>
            </div>
            </div>
        )}
        {step === 3 && tutorialMoment &&  (
            <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 16, flex: 1, minHeight: 0 }}>
            {/* left: waved-back card */}
            <div style={{ ...softCard, padding: 20, display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center" }}>
                <p className="font-sans" style={{ margin: "0 0 10px", fontSize: 10, letterSpacing: "0.14em", textTransform: "uppercase", fontWeight: 700, color: "rgba(139,105,20,0.72)", textAlign: "center" }}>Waved back</p>
                <div style={{ width: 220, padding: "11px 12px", borderRadius: 12, border: "1px solid rgba(196,160,85,0.4)", background: "var(--card)", boxShadow: "0 10px 22px rgba(139,105,20,0.1), inset 0 1px 0 rgba(255,255,255,0.62)" }}>
                <div style={{ height: 3.5, borderRadius: 999, background: "#7A5A0E", opacity: 0.96, marginBottom: 9 }}/>
                <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
                    <div style={{ width: 24, height: 31, borderRadius: 7, overflow: "hidden", display: "flex", alignItems: "center", justifyContent: "center", background: "#8B6914", color: "var(--bg)", border: "1px solid rgba(139,105,20,0.12)", flexShrink: 0 }}>
                    <span style={{ fontFamily: "Playfair Display,serif", fontSize: 9.5, fontWeight: 700, color: "var(--bg)" }}>
                        {(selectedCloseReader?.name || SOFIA.name).split(" ").map(p => p[0]).join("")}
                    </span>
                    </div>
                    <div style={{ minWidth: 0, flex: 1 }}>
                    <p className="font-serif" style={{ fontSize: 12.5, fontWeight: 700, color: "var(--text)", margin: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{selectedCloseReader?.name || SOFIA.name}</p>
                    <p className="font-sans"  style={{ fontSize: 10, color: "rgba(72,55,18,0.96)", margin: "3px 0 0", lineHeight: 1.4, fontWeight: 600 }}>is your Close Reader</p>
                    </div>
                </div>
                <div style={{ marginTop: 8, display: "inline-flex", alignItems: "center", padding: "4px 8px", borderRadius: 999, background: "rgba(255,255,255,0.48)", border: "1px solid rgba(196,160,85,0.4)" }}>
                    <span className="font-reading" style={{ fontSize: 9.5, fontStyle: "italic", color: "var(--text)", lineHeight: 1.2, whiteSpace: "nowrap" }}>{tutorialMoment.book}</span>
                </div>
                <div style={{ marginTop: 9 }}>
                    <button onClick={() => setWhisperOpen(true)} style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", height: 30, padding: "0 14px", borderRadius: 999, border: "1.5px solid rgba(154,116,21,0.46)", background: "rgba(255,255,255,0.78)", boxShadow: "inset 0 1px 0 rgba(255,255,255,0.55)", cursor: "pointer", fontFamily: "Playfair Display,serif", fontSize: 10.5, fontStyle: "italic", fontWeight: 600, color: "#8B6914", letterSpacing: "0.01em" }}>Whisper</button>
                </div>
                </div>
                <p className="font-reading" style={{ margin: "12px 0 0", fontSize: 12, lineHeight: 1.55, color: "rgba(44,26,8,0.44)", textAlign: "center", fontStyle: "italic" }}>
                click Whisper to converse with {(selectedCloseReader?.name || SOFIA.name).split(" ")[0]} (Quietly)
                </p>
            </div>

            {/* right: whisper thread */}
            <div style={{ ...softCard, padding: 0, overflow: "hidden", display: "flex", flexDirection: "column", position: "relative", minHeight: 0, filter: whisperOpen ? "none" : "blur(5px)", opacity: whisperOpen ? 1 : 0.7, transition: "filter 420ms ease, opacity 420ms ease", pointerEvents: whisperOpen ? "auto" : "none" }}>
                {/* header */}
                <div style={{ flexShrink: 0, padding: "12px 14px", borderBottom: "1px solid rgba(139,105,20,0.1)", display: "grid", gridTemplateColumns: "auto auto 1fr auto auto", alignItems: "center", columnGap: 10 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "center", width: 28, height: 28, borderRadius: "50%", background: "rgba(139,105,20,0.07)", border: "1px solid rgba(139,105,20,0.22)", color: "var(--amber)", fontSize: 14, lineHeight: 1 }}>←</div>
                <div style={{ minWidth: 100, flexShrink: 0 }}>
                    <p className="font-serif" style={{ fontSize: 13, fontWeight: 600, color: "var(--text)", margin: 0, whiteSpace: "nowrap" }}>{selectedCloseReader?.name || SOFIA.name}</p>
                    <p className="font-sans"  style={{ fontSize: 8,  color: "var(--text)", margin: "1px 0 0", letterSpacing: "0.04em" }}>Whisper</p>
                </div>
                <div/>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "center", width: 36, height: 26, borderRadius: 13, border: "1px solid rgba(139,105,20,0.18)", background: "rgba(139,105,20,0.04)" }}>
                    <svg width="22" height="15" viewBox="0 0 24 16" style={{ display: "block" }}>
                    <text x="6.8" y="13.2" fontFamily="'Playfair Display',serif" fontWeight="700" fontSize="15" fill="#2D8A4E">t</text>
                    <text x="10.9" y="11.0" fontFamily="'Playfair Display',serif" fontWeight="700" fontSize="15" fill="#C0392B" transform="rotate(180 14.2 8.2)">t</text>
                    </svg>
                </div>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "center", width: 28, height: 28, borderRadius: 14, border: "1px solid rgba(139,105,20,0.22)" }}>
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="3" cy="7" r="1.2" fill="#8B6914"/><circle cx="7" cy="7" r="1.2" fill="#8B6914"/><circle cx="11" cy="7" r="1.2" fill="#8B6914"/></svg>
                </div>
                </div>

                {/* thread */}
                <div style={{ flex: 1, minHeight: 0, overflowY: "auto", padding: "16px", display: "flex", flexDirection: "column", justifyContent: whisperSent ? "flex-start" : "center" }}>
                {whisperSent ? (
                    <div style={{ marginLeft: "auto", maxWidth: "80%", background: "rgba(139,105,20,0.12)", borderRadius: "12px 12px 4px 12px", padding: "8px 12px" }}>
                    <p style={{ margin: 0, fontSize: 12, lineHeight: 1.6, color: "var(--text)", fontFamily: "'DM Sans',sans-serif" }}>{whisperSent}</p>
                    </div>
                ) : (
                    <p className="font-reading" style={{ fontSize: 12, color: "rgba(44,26,8,0.28)", fontStyle: "italic", textAlign: "center", lineHeight: 1.6 }}>
                    Start your first whisper with {(selectedCloseReader?.name || SOFIA.name).split(" ")[0]}.
                    </p>
                )}
                </div>

                {/* compose */}
                {!whisperSent && (
                <div style={{ flexShrink: 0, margin: "0 12px 12px", background: "var(--bg)", border: "1px solid rgba(139,105,20,0.25)", borderRadius: 14, padding: "12px 14px", boxShadow: "0 4px 16px rgba(139,105,20,0.1)" }}>
                    <textarea
                        dir="ltr"
                        value={whisperText}
                        onChange={e => setWhisperText(e.target.value)}
                        placeholder="hey! I read this too. feels like we landed somewhere different. curious where you went with it."
                        autoFocus
                        style={{ width: "100%", minHeight: 56, border: "none", outline: "none", fontSize: 12, lineHeight: 1.65, color: "rgba(44,26,8,0.76)", resize: "none", background: "transparent", fontFamily: "'DM Sans',sans-serif", boxSizing: "border-box" }}
                    />
                    <div style={{ display: "flex", justifyContent: "flex-end", gap: 6, marginTop: 6 }}>
                    <button className="font-sans" onClick={() => setWhisperText("")} style={{ padding: "4px 10px", borderRadius: 12, border: "1px solid rgba(139,105,20,0.2)", background: "transparent", fontSize: 9, color: "var(--text)", cursor: "pointer" }}>Cancel</button>
                    <button className="font-sans" onClick={() => { if (whisperText.trim()) { setWhisperSent(whisperText.trim()); setWhisperText(""); }}}
                        style={{ padding: "4px 14px", borderRadius: 12, border: "none", background: whisperText.trim() ? "rgba(139,105,20,0.72)" : "rgba(139,105,20,0.18)", fontSize: 9, fontWeight: 600, color: "var(--bg)", cursor: whisperText.trim() ? "pointer" : "default", letterSpacing: "0.04em", transition: "background 160ms ease" }}>Send</button>
                    </div>
                </div>
                )}
            </div>
            </div>
        )}

        {done && (
            <div style={{ textAlign: "center", padding: "32px 0" }}>
                <p className="font-serif" style={{ fontSize: 26, fontStyle: "italic", color: "#1e1508", marginBottom: 24 }}>You've completed the guide.</p>
                <button
                    onClick={() => {
                        const o = window.parent.document.getElementById('demo-overlay');
                        o.style.opacity = '0';
                        setTimeout(() => o.style.display = 'none', 600);
                    }}                    
                    style={{ padding: "14px 40px", border: "none", background: "#1e1508", fontFamily: "'DM Sans',sans-serif", fontSize: 13, letterSpacing: "0.2em", textTransform: "uppercase", color: "#ede5ce", cursor: "pointer" }}
                    onMouseOver={e => e.target.style.background='#3a2c18'}
                    onMouseOut={e => e.target.style.background='#1e1508'}>
                    Back to Product Page
                </button>
            </div>
        )}

        {/* nav row */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 14, position: "relative" }}>
          {(step > 0 || selectedBook) && (
            <button
                onClick={() => {
                setDone(false);
                if (step === 0 && selectedBook) { setSelectedBookId(null); setSelectedPassageId(null); return; }
                setStep(s => Math.max(0, s - 1));
                }}
                className="font-sans"
                onMouseEnter={() => setHoveredButton("back")}
                onMouseLeave={() => setHoveredButton(null)}
                style={subtleButton(hoveredButton === "back")}>
                {step === 0 && selectedBook ? "Choose Another Book" : "Back"}
            </button>
          )}

          {step === 1 && (
            <button onClick={nextStep} className="font-sans" onMouseEnter={() => setHoveredButton("proceed")} onMouseLeave={() => setHoveredButton(null)} style={actionButton(canAdvance, hoveredButton === "proceed")}>
              Proceed to find close readers
            </button>
          )}
          {step === 2 && (
            <button onClick={nextStep} className="font-sans" onMouseEnter={() => setHoveredButton("proceed")} onMouseLeave={() => setHoveredButton(null)} style={actionButton(canAdvance, hoveredButton === "proceed")}>
              Proceed to whisper
            </button>
          )}
          {step === 3 && !done && (
            <p className="font-reading" style={{ position: "absolute", left: 0, right: 0, textAlign: "center", margin: 0, fontSize: 14, lineHeight: 1.5, color: "rgba(44,26,8,0.62)", pointerEvents: "none" }}>
              Guide is over! You can now begin{" "}
              <button onClick={finish} onMouseEnter={() => setHoveredButton("enter")} onMouseLeave={() => setHoveredButton(null)}
                style={{ pointerEvents: "auto", background: "none", border: "none", borderRadius: 0, padding: "0 0 2px", cursor: "pointer", fontFamily: "inherit", fontSize: "inherit", lineHeight: "inherit", color: "#8B6914", fontWeight: 700, borderBottom: `${hoveredButton === "enter" ? 2 : 1}px solid ${hoveredButton === "enter" ? "rgba(139,105,20,0.82)" : "rgba(139,105,20,0.52)"}`, transform: hoveredButton === "enter" ? "translateY(-1px)" : "none", transition: "border-color 160ms ease, transform 160ms ease" }}>READ</button>ing
            </p>
          )}
        </div>

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ReaderOnboardingOverlay/>);
window.addEventListener('message', (e) => {
  if (e.data === 'reset') {
    root.render(<ReaderOnboardingOverlay/>);
  }
});
</script>
</body>
</html>
